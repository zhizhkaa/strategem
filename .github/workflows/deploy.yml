name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/windows-portable.yml"
      - "docs/windows-portable.md"
      - "requirements-windows-build.txt"
      - "scripts/windows/**"
      - "tests/test_windows_portable_packaging.py"

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /opt/strategem

            git fetch origin main
            git checkout main
            git sparse-checkout init --no-cone
            cat > .git/info/sparse-checkout <<'SPARSE'
            /backend/
            /frontend/
            /nginx/
            /Dockerfile
            /docker-compose.yml
            /requirements.txt
            SPARSE
            git sparse-checkout reapply
            git pull --ff-only origin main
            rm -rf dist .tmp

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            DB_CONTAINER="$($COMPOSE ps -q db || true)"
            if [ -z "$DB_CONTAINER" ]; then
              $COMPOSE up -d db
            elif [ "$(docker inspect -f '{{.State.Running}}' "$DB_CONTAINER")" != "true" ]; then
              docker start "$DB_CONTAINER"
            fi

            until $COMPOSE exec -T db sh -c 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'; do
              sleep 2
            done

            $COMPOSE build web

            WEB_CONTAINER="$($COMPOSE ps -q web || true)"
            if [ -n "$WEB_CONTAINER" ]; then
              docker rm -f "$WEB_CONTAINER"
            fi

            $COMPOSE up -d --no-deps web

            $COMPOSE exec -T web python manage.py migrate --noinput
            $COMPOSE exec -T web python manage.py collectstatic --noinput --clear
            $COMPOSE exec -T web python manage.py check --deploy

            if [ -n "$($COMPOSE ps -q nginx || true)" ]; then
              $COMPOSE restart nginx
            else
              $COMPOSE up -d --no-deps nginx
            fi

            $COMPOSE ps

            docker image prune -f

            echo "Deployment completed successfully!"
