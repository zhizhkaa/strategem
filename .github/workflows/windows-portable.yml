name: Build Windows portable package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag for the Windows package, for example windows-portable-2026-06-08"
        required: true
        type: string
  push:
    tags:
      - "v*"
      - "windows-*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-windows-build.txt

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Install package build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-windows-build.txt

      - name: Build portable app
        shell: pwsh
        run: .\scripts\windows\build-portable.ps1

      - name: Verify executable package
        shell: pwsh
        run: |
          if (-not (Test-Path .\dist\Strategem-Windows\Strategem.exe)) { throw "Strategem.exe was not created" }
          if (-not (Test-Path .\dist\Strategem-Windows\data)) { throw "data directory was not created" }
          if (-not (Test-Path .\dist\Strategem-Windows\media)) { throw "media directory was not created" }

      - name: Archive portable package
        shell: pwsh
        run: Compress-Archive -Path .\dist\Strategem-Windows\* -DestinationPath .\dist\Strategem-Windows.zip -Force

      - name: Resolve release tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.release_tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) { throw "Release tag is required" }
          "RELEASE_TAG=$tag" >> $env:GITHUB_ENV

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = ".\dist\Strategem-Windows.zip"
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --title "Strategem Windows $env:RELEASE_TAG" --notes "Offline Windows portable build for Strategem."
          }
          gh release upload $env:RELEASE_TAG $asset --clobber
