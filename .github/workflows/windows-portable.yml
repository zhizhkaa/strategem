name: Build Windows portable package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag for the Windows package, for example windows-portable-2026-06-08"
        required: true
        type: string
      changelog:
        description: "Release changelog text. If empty, CHANGELOG.md is used when present."
        required: false
        type: string
      release_title:
        description: "Release title. If empty, a title is derived from the release tag."
        required: false
        type: string
  push:
    tags:
      - "v*"
      - "windows-*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-windows-build.txt

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Install package build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-windows-build.txt

      - name: Build portable app
        shell: pwsh
        run: .\scripts\windows\build-portable.ps1

      - name: Verify executable package
        shell: pwsh
        run: |
          if (-not (Test-Path .\dist\Strategem-Windows\Strategem.exe)) { throw "Strategem.exe was not created" }
          $unexpectedFiles = Get-ChildItem .\dist\Strategem-Windows -Force | Where-Object { $_.Name -ne "Strategem.exe" }
          if ($unexpectedFiles) { throw "Single-file release directory contains unexpected files: $($unexpectedFiles.Name -join ', ')" }

      - name: Resolve release tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.release_tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) { throw "Release tag is required" }
          "RELEASE_TAG=$tag" >> $env:GITHUB_ENV

      - name: Resolve release changelog
        shell: pwsh
        run: |
          $notesPath = ".\dist\release-notes.md"
          $inputNotes = "${{ inputs.changelog }}"
          if (-not [string]::IsNullOrWhiteSpace($inputNotes)) {
            $inputNotes | Set-Content -Path $notesPath -Encoding UTF8
          } elseif (Test-Path .\CHANGELOG.md) {
            Copy-Item .\CHANGELOG.md $notesPath -Force
          } else {
            "Offline Windows executable build for Strategem." | Set-Content -Path $notesPath -Encoding UTF8
          }
          "RELEASE_NOTES=$notesPath" >> $env:GITHUB_ENV

      - name: Resolve release title
        shell: pwsh
        run: |
          $title = "${{ inputs.release_title }}"
          if ([string]::IsNullOrWhiteSpace($title)) {
            if ($env:RELEASE_TAG -match '^v([0-9]+)\.([0-9]+)\.0\+([0-9]{8})$') {
              $title = "Strategem v$($Matches[1]).$($Matches[2]) ($($Matches[3]))"
            } elseif ($env:RELEASE_TAG -match '^v([0-9]+)\.([0-9]+)\.([0-9]+)\+([0-9]{8})$') {
              $title = "Strategem v$($Matches[1]).$($Matches[2]).$($Matches[3]) ($($Matches[4]))"
            } else {
              $title = "Strategem Windows $env:RELEASE_TAG"
            }
          }
          "RELEASE_TITLE=$title" >> $env:GITHUB_ENV

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = ".\dist\Strategem-Windows\Strategem.exe"
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --title "$env:RELEASE_TITLE" --notes-file $env:RELEASE_NOTES
          } else {
            gh release edit $env:RELEASE_TAG --title "$env:RELEASE_TITLE" --notes-file $env:RELEASE_NOTES
          }
          gh release upload $env:RELEASE_TAG $asset --clobber
