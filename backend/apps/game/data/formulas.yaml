# Формулы расчётов игры Стратегема
#
# Доступные функции:
#   - min(a, b) - минимум из двух значений
#   - max(a, b) - максимум из двух значений
#   - round(value, decimals) - округление
#   - interpolate(TABLE, value) - линейная интерполяция по таблице
#   - mean(param, periods) - среднее значение параметра за последние N периодов
#   - prev(param) - значение параметра из предыдущего периода
#
# Порядок расчётов определяется в decision_order.yaml

# ============================================
# 1. ЭНЕРГЕТИКА (calc_energy)
# ============================================
calc_energy:
  E3: "prev(E3) - prev(E1) + prev(E26)"
  E6: "prev(E6) - prev(E4) + prev(E27)"
  E4: "E6 / 5"
  E18: "prev(E21)"

# ============================================
# 2. СЕЛЬСКОЕ ХОЗЯЙСТВО (calc_agriculture)
# ============================================
calc_agriculture:
  F3: "prev(F3) - prev(F1) + prev(F14)"
  F6: "prev(F6) - prev(F4) + prev(F15)"
  F4: "F6 / 6"
  F7: "prev(F7) + interpolate(F4, prev(F7)) - interpolate(F3, (prev(F3) * prev(F10) + prev(G3) * prev(G11) + prev(E3) - 3 * prev(F6)) / 20000)"
  F8: "F3 / 1000"
  F12: "prev(TF12)"

# ============================================
# 3. ПРОМЫШЛЕННОСТЬ (calc_industry)
# ============================================
calc_industry:
  G3: "prev(G3) - prev(G1) + prev(G18)"
  G6: "prev(G6) - prev(G4) + prev(G19)"
  G4: "G6 / 9"
  G13: "prev(TF11)"

# ============================================
# 4. ФИНАНСЫ (calc_finance)
# ============================================
calc_finance:
  TF1: "prev(TF1) + prev(TF13) + prev(TF4) - prev(TF14)"

# ============================================
# 5. НАСЕЛЕНИЕ (calc_population)
# ============================================
calc_population:
  P4: "prev(P9) / (prev(P1) * 5)"
  P6: "prev(P11) / (prev(P1) * 5)"
  P5: "interpolate(P3, P4) * interpolate(P4, F7) * 1000"
  P7: "G6 / prev(P1)"
  P8: "interpolate(P1, P6) * interpolate(P2, P7) * 1000"
  P1: "prev(P1) + (prev(P1) / 1000) * (P8 - P5) * 5"

# ============================================
# 6. КАПИТАЛ (calc_capital)
# ============================================
calc_capital:
  E1: "E3 / 5"
  E2: "E3 - E1"
  E5: "E6 * 0.8"
  G1: "G3 / 5"
  G2: "G3 - G1"
  G5: "G6 * 8 / 9"
  F1: "F3 / 5"
  F2: "F3 - F1"
  F5: "F6 * 5 / 6"

# ============================================
# 7. ЭНЕРГОПОТРЕБЛЕНИЕ (calc_energy_consumption)
# ============================================
calc_energy_consumption:
  E10: "interpolate(E2, E6 / (G3 + F3))"
  E11: "E10 * 5 * 2.5"
  E12: "E11 * F3"
  E13: "E10 * 5 * 4"
  E14: "E13 * G3"
  E15: "E12 + E14"

# ============================================
# 8. ПРОИЗВОДСТВЕННЫЕ ПОКАЗАТЕЛИ (calc_production_indicators)
# ============================================
calc_production_indicators:
  G7: "G3 / (0.25 * P1)"
  G9: "G6 / P1"
  G11: "min(prev(E25) / prev(E14), 1.1)"
  G10: "interpolate(G2, G9)"
  G8: "interpolate(G3, G7)"
  F10: "min(prev(E24) / prev(E12), 1.1)"
  F9: "6250 * interpolate(F2, F3 * F10 / 1000) * F7"

# ============================================
# 9. ТОРГОВЛЯ И ФИНАНСЫ (calc_trade_finance)
# ============================================
calc_trade_finance:
  # avg_export = mean(TF10, 3) + mean(TF11, 3) + mean(TF12, 3)
  # debt_to_export = TF1 / avg_export
  TF2: "interpolate(TF2, TF1 / (mean(TF10, 3) + mean(TF11, 3) + mean(TF12, 3))) * 100"
  TF3: "min(interpolate(TF1, TF1 / (mean(TF10, 3) + mean(TF11, 3) + mean(TF12, 3))), 2)"
  TF4: "TF1 * TF2 / 100 * 5"
  TF5: "max_loan()"
  TF6: "TF3"
  TF7: "min(TF3 * 1.1, 2.2)"
  TF8: "TF7"

# ============================================
# 10. ЭНЕРГЕТИЧЕСКИЙ БАЛАНС (calc_energy_balance)
# ============================================
calc_energy_balance:
  E8: "0.2"
  E9: "prev(P11) / 5"
  E17: "interpolate(E1, E3 / 1000) * 1000"
  E16: "max(prev(E17) / prev(E3), 3.5)"
  E19: "prev(TF16) / prev(TF6)"
  E7: "prev(E17) + E19 + prev(E22)"

# ============================================
# 11. ПРОИЗВОДСТВО ТОВАРОВ (calc_goods_production)
# ============================================
calc_goods_production:
  G12: "0.25 * P1 * 1.155 * G10 * G8 * 5 * min(interpolate(G1, P6 / prev(P6)), 1)"
  G14: "prev(TF17) / TF7"
  G15: "0.25 * P1 * 1.155 * G10 * G8 * 5"
  G16: "G12 + G14"
  G17: "E1 + E4 + F1 + F4 + G1 + G4"

# ============================================
# 12. ПРОИЗВОДСТВО ПРОДОВОЛЬСТВИЯ (calc_food_production)
# ============================================
calc_food_production:
  F11: "6250 * min(interpolate(F2, F3 * F10 / 1000), 5) * F7 * min(interpolate(F1, P4 / prev(P4)), 1)"
  F13: "prev(TF18) / TF8"

# ============================================
# 13. ИТОГОВЫЕ БАЛАНСЫ (calc_final_totals)
# ============================================
calc_final_totals:
  P2: "F13 + F11"
  P3: "G14 + G12"
  # Штраф при высоком долге: если TF1 > 0.5 * (P3 + P2 + E7), то P3 = P3 * 0.9
  # Это обрабатывается отдельно в коде

# ============================================
# ФОРМУЛЫ ДЛЯ ТЕКУЩЕГО ПЕРИОДА (decisions)
# Эти формулы применяются при вводе решений
# ============================================
decisions:
  # Распределение продовольствия
  P10: "max(P2 - P9, 0)"

  # Распределение товаров
  P13: "max(P3 - P11 - P12, 0)"

  # Энергия для населения (фиксированное = P11 * 0.2)
  E20: "P11 * 0.2"

  # Распределение энергии
  E23: "max(E7 - E20 - E21 - E22, 0)"
  E25: "max(E23 - E24, 0)"

  # Капиталовложения
  F15: "max(P12 - E26 - E27 - G18 - G19 - F14, 0)"

  # Экспорт (фиксированные значения из решений)
  TF10: "E21"
  TF11: "P13"
  TF12: "P10"

  # Валютный баланс
  TF15: "max(TF9 + TF10 + TF11 + TF12 + TF13 - TF14, 0)"
  TF18: "max(TF15 - TF16 - TF17, 0)"
