{% extends "base.html" %}
{% load static %}

{% block title %}Стратегема - Вход администратора{% endblock %}

{% block content %}
<div x-data="adminLogin()" class="max-w-md mx-auto mt-16">
    <!-- Header -->
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-strategem-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-strategem-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Вход для администратора</h1>
        <p class="text-gray-600 mt-2">Введите пароль для доступа к панели управления</p>
    </div>

    <!-- Login Form -->
    <div class="bg-white rounded-lg shadow-md p-6">
        <form @submit.prevent="login()" class="space-y-4">
            <!-- Password Input -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    Пароль
                </label>
                <div class="relative">
                    <input :type="showPassword ? 'text' : 'password'"
                           id="password"
                           x-model="password"
                           @keyup.enter="login()"
                           :disabled="loading"
                           placeholder="Введите пароль"
                           class="w-full px-4 py-2 pr-10 border border-gray-300 rounded-md shadow-sm focus:ring-strategem-500 focus:border-strategem-500 disabled:bg-gray-100 disabled:cursor-not-allowed"
                           autocomplete="current-password">
                    <button type="button"
                            @click="showPassword = !showPassword"
                            :aria-label="showPassword ? 'Скрыть пароль' : 'Показать пароль'"
                            :title="showPassword ? 'Скрыть пароль' : 'Показать пароль'"
                            class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-gray-600">
                        <svg x-show="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        <svg x-show="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Error Message -->
            <div x-show="error" x-cloak class="bg-red-50 border border-red-200 rounded-md p-3">
                <p class="text-red-700 text-sm" x-text="error"></p>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                    :disabled="!password || loading"
                    class="w-full py-2 px-4 bg-strategem-600 text-white font-medium rounded-md shadow-sm hover:bg-strategem-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-strategem-500 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors flex items-center justify-center">
                <template x-if="loading">
                    <div class="loader mr-2"></div>
                </template>
                <span x-text="loading ? 'Вход...' : 'Войти'"></span>
            </button>
        </form>
    </div>

    <!-- Back Link -->
    <div class="mt-6 text-center">
        <a href="/" class="text-strategem-600 hover:underline text-sm">
            ← Вернуться на главную
        </a>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'js/pages/admin-login.js' %}"></script>
{% endblock %}
