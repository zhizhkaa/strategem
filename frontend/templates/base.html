{% load static %}
<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Стратегема{% endblock %}</title>

        <!-- Alpine.js  -->
        <script
            defer
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
        ></script>

        <!-- Chart.js для графиков -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <!-- Tailwind CSS для стилей -->
        <script src="https://cdn.tailwindcss.com"></script>

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            strategem: {
                                50: "#f0f9ff",
                                100: "#e0f2fe",
                                200: "#bae6fd",
                                300: "#7dd3fc",
                                400: "#38bdf8",
                                500: "#0ea5e9",
                                600: "#0284c7",
                                700: "#0369a1",
                                800: "#075985",
                                900: "#0c4a6e",
                            },
                        },
                    },
                },
            };
        </script>

        <!-- Custom styles -->
        <link rel="stylesheet" href="{% static 'css/main.css' %}" />

        {% block extra_head %}{% endblock %}
    </head>
    <body class="bg-gray-50 min-h-screen">
        <!-- Navigation -->
        <nav class="bg-strategem-700 text-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                        <a href="/" class="flex items-center space-x-2">
                            <svg
                                class="w-8 h-8"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
                                />
                            </svg>
                            <span class="font-bold text-xl">Стратегема</span>
                        </a>
                    </div>

                    <div class="flex items-center space-x-4">
                        {% block nav_items %}
                        <a
                            href="/"
                            class="hover:bg-strategem-600 px-3 py-2 rounded-md text-sm font-medium transition-colors"
                        >
                            Главная
                        </a>
                        <a
                            href="/admin-login/"
                            class="hover:bg-strategem-600 px-3 py-2 rounded-md text-sm font-medium transition-colors"
                        >
                            Администратор
                        </a>
                        <a
                            href="/api/docs/"
                            class="hover:bg-strategem-600 px-3 py-2 rounded-md text-sm font-medium transition-colors"
                            target="_blank"
                        >
                            API Docs
                        </a>
                        {% endblock %}
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {% block content %}{% endblock %}
        </main>

        <!-- Toast Notifications -->
        <div
            x-data="toastManager()"
            x-on:show-toast.window="addToast($event.detail)"
            class="fixed bottom-4 right-4 z-50 space-y-2"
        >
            <template x-for="toast in toasts" :key="toast.id">
                <div
                    x-show="toast.visible"
                    x-transition:enter="transition ease-out duration-300"
                    x-transition:enter-start="opacity-0 transform translate-x-4"
                    x-transition:enter-end="opacity-100 transform translate-x-0"
                    x-transition:leave="transition ease-in duration-200"
                    x-transition:leave-start="opacity-100 transform translate-x-0"
                    x-transition:leave-end="opacity-0 transform translate-x-4"
                    :class="{
                     'bg-green-500': toast.type === 'success',
                     'bg-red-500': toast.type === 'error',
                     'bg-yellow-500': toast.type === 'warning',
                     'bg-blue-500': toast.type === 'info'
                 }"
                    class="text-white px-4 py-3 rounded-lg shadow-lg flex items-center space-x-2 min-w-[300px]"
                >
                    <span x-text="toast.message"></span>
                    <button
                        @click="removeToast(toast.id)"
                        class="ml-auto hover:opacity-75"
                    >
                        <svg
                            class="w-4 h-4"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"
                            />
                        </svg>
                    </button>
                </div>
            </template>
        </div>

        <script>
            // Toast Manager
            function toastManager() {
                return {
                    toasts: [],
                    addToast(detail) {
                        const id = Date.now();
                        this.toasts.push({
                            id,
                            message: detail.message,
                            type: detail.type || "info",
                            visible: true,
                        });

                        setTimeout(() => {
                            this.removeToast(id);
                        }, detail.duration || 5000);
                    },
                    removeToast(id) {
                        const toast = this.toasts.find((t) => t.id === id);
                        if (toast) {
                            toast.visible = false;
                            setTimeout(() => {
                                this.toasts = this.toasts.filter(
                                    (t) => t.id !== id,
                                );
                            }, 300);
                        }
                    },
                };
            }

            // Helper function to show toast
            function showToast(message, type = "info", duration = 5000) {
                window.dispatchEvent(
                    new CustomEvent("show-toast", {
                        detail: { message, type, duration },
                    }),
                );
            }

            // CSRF token helper
            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== "") {
                    const cookies = document.cookie.split(";");
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (
                            cookie.substring(0, name.length + 1) ===
                            name + "="
                        ) {
                            cookieValue = decodeURIComponent(
                                cookie.substring(name.length + 1),
                            );
                            break;
                        }
                    }
                }
                return cookieValue;
            }

            // API helper
            const API = {
                baseUrl: "/api",

                getCSRFToken() {
                    return getCookie("csrftoken");
                },

                async get(endpoint) {
                    const response = await fetch(this.baseUrl + endpoint, {
                        credentials: "include",
                    });
                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error || "Ошибка запроса");
                    }
                    return response.json();
                },

                async post(endpoint, data = {}) {
                    const response = await fetch(this.baseUrl + endpoint, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-CSRFToken": this.getCSRFToken(),
                        },
                        credentials: "include",
                        body: JSON.stringify(data),
                    });
                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error || "Ошибка запроса");
                    }
                    return response.json();
                },

                async delete(endpoint) {
                    const response = await fetch(this.baseUrl + endpoint, {
                        method: "DELETE",
                        headers: {
                            "X-CSRFToken": this.getCSRFToken(),
                        },
                        credentials: "include",
                    });
                    if (!response.ok && response.status !== 204) {
                        const error = await response.json();
                        throw new Error(error.error || "Ошибка запроса");
                    }
                    return response.status === 204 ? null : response.json();
                },
            };
        </script>

        {% block extra_scripts %}{% endblock %}
    </body>
</html>
