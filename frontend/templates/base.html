{% load static %}
<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Стратегема{% endblock %}</title>

        <!-- Alpine.js  -->
        <script defer src="{% static 'vendor/alpinejs/alpine.min.js' %}"></script>

        <!-- Chart.js для графиков -->
        <script src="{% static 'vendor/chartjs/chart.umd.min.js' %}"></script>

        <!-- Tailwind CSS для стилей -->
        <link rel="stylesheet" href="{% static 'css/tailwind.css' %}" />

        <!-- Custom styles -->
        <link rel="stylesheet" href="{% static 'css/main.css' %}" />

        {% block extra_head %}{% endblock %}
    </head>
    <body class="bg-gray-50 min-h-screen">
        <!-- Navigation -->
        <nav class="bg-strategem-700 text-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                        <a href="/" class="flex items-center space-x-2">
                            <svg
                                class="w-8 h-8"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
                                />
                            </svg>
                            <span class="font-bold text-xl">Стратегема</span>
                        </a>
                    </div>

                    <div class="flex items-center space-x-4">
                        {% block nav_items %}
                        <a
                            href="/"
                            class="hover:bg-strategem-600 px-3 py-2 rounded-md text-sm font-medium transition-colors"
                        >
                            Главная
                        </a>
                        <a
                            href="/admin-login/"
                            class="hover:bg-strategem-600 px-3 py-2 rounded-md text-sm font-medium transition-colors"
                        >
                            Администратор
                        </a>
                        {% endblock %}
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {% block content %}{% endblock %}
        </main>

        <!-- Toast Notifications -->
        <div
            x-data="toastManager()"
            x-on:show-toast.window="addToast($event.detail)"
        >
            <div class="fixed bottom-4 right-4 z-50 space-y-2">
                <template x-for="toast in toasts" :key="toast.id">
                    <div
                        x-show="toast.visible"
                        x-transition:enter="transition ease-out duration-300"
                        x-transition:enter-start="opacity-0 transform translate-x-4"
                        x-transition:enter-end="opacity-100 transform translate-x-0"
                        x-transition:leave="transition ease-in duration-200"
                        x-transition:leave-start="opacity-100 transform translate-x-0"
                        x-transition:leave-end="opacity-0 transform translate-x-4"
                        :class="{
                         'bg-green-500': toast.type === 'success',
                         'bg-red-500': toast.type === 'error',
                         'bg-yellow-500': toast.type === 'warning',
                         'bg-blue-500': toast.type === 'info'
                     }"
                        class="text-white px-4 py-3 rounded-lg shadow-lg flex items-start gap-2 min-w-[300px] max-w-md"
                    >
                        <div class="min-w-0 flex-1">
                            <span class="block break-words whitespace-pre-line" x-text="toast.message"></span>
                            <button
                                x-show="toast.details.length > 0"
                                @click="openDetails(toast)"
                                class="mt-2 text-sm underline hover:opacity-80"
                            >
                                Показать все
                            </button>
                        </div>
                        <button
                            @click="removeToast(toast.id)"
                            class="ml-auto hover:opacity-75"
                        >
                            <svg
                                class="w-4 h-4"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12"
                                />
                            </svg>
                        </button>
                    </div>
                </template>
            </div>

            <div
                x-show="detailModal"
                x-cloak
                class="fixed inset-0 z-[60] flex items-center justify-center bg-black bg-opacity-40 px-4"
                @keydown.escape.window="closeDetails()"
            >
                <div
                    class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[80vh] overflow-hidden"
                    @click.outside="closeDetails()"
                >
                    <div class="flex items-center justify-between px-5 py-4 border-b">
                        <h2 class="text-lg font-semibold text-gray-900" x-text="detailModal?.title"></h2>
                        <button
                            @click="closeDetails()"
                            class="text-gray-500 hover:text-gray-700"
                            aria-label="Закрыть"
                        >
                            <svg
                                class="w-5 h-5"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12"
                                />
                            </svg>
                        </button>
                    </div>
                    <div class="p-5 overflow-y-auto max-h-[60vh]">
                        <ul class="space-y-2 text-sm text-gray-700">
                            <template x-for="item in detailModal?.items || []" :key="item">
                                <li class="border border-gray-200 rounded-md px-3 py-2" x-text="item"></li>
                            </template>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <script src="{% static 'js/app.js' %}"></script>

        {% block extra_scripts %}{% endblock %}
    </body>
</html>
