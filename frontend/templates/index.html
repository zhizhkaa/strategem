{% extends "base.html" %}
{% load static %}
{% block title %}
Стратегема - Выбор команды
{% endblock%}
{% block content %}
<div x-data="teamSelection()" x-init="init()" class="max-w-2xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">
            Добро пожаловать в Стратегему
        </h1>
        <p class="text-gray-600">Выберите вашу команду для начала игры</p>
    </div>

    <!-- Selection Form -->
    <div class="bg-white rounded-lg shadow-md p-6 space-y-6">
        <!-- Faculty Selection -->
        <div>
            <label
                for="faculty"
                class="block text-sm font-medium text-gray-700 mb-2"
            >
                Факультет
            </label>
            <select
                id="faculty"
                x-model="selectedFaculty"
                @change="onFacultyChange()"
                :disabled="loading"
                class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-strategem-500 focus:border-strategem-500 disabled:bg-gray-100 disabled:cursor-not-allowed"
            >
                <option value="">Выберите факультет</option>
                <template x-for="faculty in faculties" :key="faculty.id">
                    <option :value="faculty.id" x-text="faculty.name"></option>
                </template>
            </select>
        </div>

        <!-- Group Selection -->
        <div>
            <label
                for="group"
                class="block text-sm font-medium text-gray-700 mb-2"
            >
                Группа
            </label>
            <select
                id="group"
                x-model="selectedGroup"
                @change="onGroupChange()"
                :disabled="!selectedFaculty || loading"
                class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-strategem-500 focus:border-strategem-500 disabled:bg-gray-100 disabled:cursor-not-allowed"
            >
                <option value="">Выберите группу</option>
                <template x-for="group in filteredGroups" :key="group.id">
                    <option
                        :value="group.id"
                        x-text="`${group.name} (${group.year})`"
                    ></option>
                </template>
            </select>
        </div>

        <!-- Team Selection -->
        <div>
            <label
                for="team"
                class="block text-sm font-medium text-gray-700 mb-2"
            >
                Команда
            </label>
            <select
                id="team"
                x-model="selectedTeam"
                @change="onTeamChange()"
                :disabled="!selectedGroup || loading"
                class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-strategem-500 focus:border-strategem-500 disabled:bg-gray-100 disabled:cursor-not-allowed"
            >
                <option value="">Выберите команду</option>
                <template x-for="team in filteredTeams" :key="team.id">
                    <option
                        :value="team.id"
                        x-text="teamOptionLabel(team)"
                    ></option>
                </template>
            </select>
        </div>

        <!-- Team Status -->
        <div
            x-show="selectedTeamData"
            x-cloak
            class="border rounded-md p-3 text-sm font-medium"
            :class="teamStatusClass()"
        >
            <p x-text="teamStatusMessage()"></p>
        </div>

        <!-- Team Password -->
        <div x-show="selectedTeamData?.has_active_game" x-cloak>
            <label
                for="team-password"
                class="block text-sm font-medium text-gray-700 mb-2"
            >
                Пароль команды
            </label>
            <div class="relative">
                <input
                    id="team-password"
                    x-model="teamPassword"
                    @input="error = null"
                    :type="showTeamPassword ? 'text' : 'password'"
                    autocomplete="current-password"
                    :disabled="loading"
                    class="w-full px-4 py-2 pr-10 border border-gray-300 rounded-md shadow-sm focus:ring-strategem-500 focus:border-strategem-500 disabled:bg-gray-100 disabled:cursor-not-allowed"
                    placeholder="Введите пароль, выданный администратором"
                />
                <button
                    type="button"
                    @click="showTeamPassword = !showTeamPassword"
                    :disabled="loading"
                    :aria-label="showTeamPassword ? 'Скрыть пароль' : 'Показать пароль'"
                    :title="showTeamPassword ? 'Скрыть пароль' : 'Показать пароль'"
                    class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-gray-600 disabled:cursor-not-allowed"
                >
                    <svg x-show="!showTeamPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                    <svg x-show="showTeamPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Error Message -->
        <div
            x-show="error"
            x-cloak
            class="bg-red-50 border border-red-200 rounded-md p-4"
        >
            <p class="text-red-700 text-sm" x-text="error"></p>
        </div>

        <!-- Submit Button -->
        <button
            @click="enterGame()"
            :disabled="!canEnterGame || loading"
            class="w-full py-3 px-4 bg-strategem-600 text-white font-medium rounded-md shadow-sm hover:bg-strategem-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-strategem-500 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors flex items-center justify-center"
        >
            <template x-if="loading">
                <div class="loader mr-2"></div>
            </template>
            <span x-text="loading ? 'Загрузка...' : 'Войти в игру'"></span>
        </button>
    </div>
</div>
{% endblock %} {% block extra_scripts %}
<script src="{% static 'js/pages/team-selection.js' %}"></script>
{% endblock %}
